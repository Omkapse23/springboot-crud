<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Managemenet</title>
</head>
<body>
    <h2>Add Students</h2>

    <form action="/students/save" method="post">
        Name : 
        <input type="text" name="name" placeholder="Enter Name"> <br><br>

        Course :
        <input type="text" name="course" placeholder="Enter Course"> <br><br>

        Email :
        <input type="email" name="email" placeholder="Enter Email"> <br><br>

        <button type="submit">Submit</button>
    </form>

    <h2>Students List</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Course</th>
            <th>Email</th>
        </tr>

        <tr th:each="student : ${students}">
            <td th:text="${student.id}"></td>
            <td th:text="${student.name}"></td>
            <td th:text="${student.course}"></td>
            <td th:text="${student.email}"></td>

            <td>
                <button><a th:href="@{'/students/edit/' + ${student.id}}">Edit</a></button>
                <button><a th:href="@{'/students/delete/' + ${student.id}}">Delete</a></button>
             </td>
        </tr>
    </table>
</body>
</html>
